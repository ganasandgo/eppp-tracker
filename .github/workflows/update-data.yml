name: Update EPPP pass rate data

# Runs every Monday morning, and can also be triggered manually
# from the Actions tab any time you want an instant refresh.
"on":
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/update_data.py

      - name: Commit updated data (if anything changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eppp_stats.json
          if git diff --staged --quiet; then
            echo "No data changes - nothing to commit."
          else
            git commit -m "Auto-update EPPP pass rate data"
            git push
          fi
